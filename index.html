<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Your Page Title Here]</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6; /* Light gray background matching the screenshot */
            color: #111827;
        }

        /* Header Section */
        .hero-section {
            background-color: #FFEA00; /* Bright yellow replacement */
            text-align: center;
            padding: 60px 20px 50px 20px;
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 15px 0;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .hero-section h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            line-height: 1.3;
        }

        /* Image/Document Preview Section */
        .preview-section {
            display: flex;
            justify-content: center;
            padding: 0 20px;
            margin-top: -10px; /* Pulls it slightly up if needed, adjust as you see fit */
        }

        .preview-image-container {
            background-color: #ffffff;
            max-width: 600px;
            width: 100%;
            min-height: 300px; /* Placeholder height */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #e5e7eb;
            color: #9ca3af;
            font-weight: bold;
        }

        .preview-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Form Section */
        .form-section {
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px 20px;
        }

        .form-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group input:focus {
            border-color: #111827;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background-color: #FFEA00; /* Matching yellow button */
            color: #111827;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #e6d300;
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <h1>100 VIRAL HOOKS</h1>
        <h2>Viral proven plug in hook templates for any niche.</h2>
    </header>

    <section class="preview-section">
        <div class="preview-image-container"> 
          <img src="Screenshot_20260618_015354_Docs.jpg" alt="Spreadsheet Preview">
          
        </div>
    </section>

    <section class="form-section">
        <div class="form-card">
            
            <form action="https://formspree.io/f/maqzzvao" method="POST">
                
                <div class="input-group">
                    <label for="full-name">[Name Label]</label>
                    <input type="text" id="full-name" name="name" placeholder="[Name Placeholder]">
                </div>

                <div class="input-group">
                    <label for="email-address">[Email Label] *</label>
                    <input type="email" id="email-address" name="email" placeholder="[Email Placeholder]" required>
                </div>

                <button type="submit" class="submit-btn">[BUTTON TEXT]</button>
            </form>

        </div>
    </section>

</body>
</html>
