<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fff; color: #000; margin: 0; padding: 20px; display: flex; justify-content: center; }
  .container { max-width: 900px; display: flex; flex-wrap: wrap-reverse; align-items: center; gap: 40px; margin-top: 10vh; }
  .text-section { flex: 1; min-width: 300px; }
  .image-section { flex: 1; min-width: 300px; text-align: center; }
  h1 { font-size: 2.8rem; margin-bottom: 10px; line-height: 1.1; font-weight: 800; }
  p { font-size: 1.2rem; margin-bottom: 25px; color: #444; }
  img { max-width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
  button { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 6px; font-size: 1.2rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="container">
    <div class="text-section">
      <!-- CHANGE YOUR TEXT HERE -->
      <h1>100 VIRAL HOOKS</h1>
      <p>Your simple, one-sentence subheadline explaining the benefit goes right here.</p>
      
      <!-- PASTE YOUR FORMSPREE LINK HERE -->
      <form action="https://formspree.io/f/maqzzvao" method="POST">
        <input type="text" name="name" placeholder="First Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <button type="submit">Get It Now</button>
      </form>
    </div>
    <div class="image-section">
      <!-- ADD YOUR IMAGE LINK HERE -->
      <img src="your-image-link.jpg" alt="Freebie Mockup">
    </div>
  </div>
</body>
</html>
