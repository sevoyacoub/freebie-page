<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>100 Viral Hooks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; }

    /* ===== HERO ===== */
    .hero {
      background-color: #FFE000;
      padding: 60px 24px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(48px, 12vw, 90px);
      font-weight: 900;
      color: #000;
      line-height: 1.05;
      text-transform: uppercase;
    }
    .hero p {
      font-size: clamp(18px, 4vw, 26px);
      color: #000;
      margin-top: 18px;
      font-weight: 400;
    }

    /* ===== CARD ===== */
    .card {
      max-width: 680px;
      margin: 36px auto;
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    }

    /* ===== SCREENSHOT PREVIEW ===== */
    .preview-image {
      width: 100%;
      display: block;
      border-radius: 8px;
      border: 1px solid #e3e3e3;
    }

    /* ===== FORM ===== */
    .form-group { margin-top: 28px; }
    .form-group label {
      display: block; font-weight: 600;
      font-size: 16px; margin-bottom: 8px; color: #111;
    }
    .form-group input {
      width: 100%; padding: 16px;
      border: 1.5px solid #ccc; border-radius: 8px;
      font-size: 16px; color: #333; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #111; }
    .form-group input::placeholder { color: #aaa; }

    .submit-btn {
      width: 100%; padding: 20px;
      background: #8DC63F; border: none; border-radius: 8px;
      font-size: 18px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: #111; cursor: pointer; margin-top: 24px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ===== THANK YOU / REDIRECT STATE ===== */
    #thank-you { display: none; text-align: center; padding: 40px 10px; }
    #thank-you h2 {
      font-size: 30px; font-weight: 900; color: #111; margin-bottom: 14px;
    }
    #thank-you p { font-size: 17px; color: #555; line-height: 1.65; }
    #thank-you .redirect-note {
      margin-top: 22px; font-size: 13px; color: #999;
    }

    /* ===== ERROR ===== */
    .error-msg {
      display: none; color: #c0392b;
      font-size: 13px; margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <h1>1,000 VIRAL<br>HOOKS</h1>
    <p>Viral proven plug in hook templates for any niche</p>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- Screenshot preview (must live in the same GitHub repo) -->
    <img
      src="Screenshot_20260618_015354_Docs.jpg"
      alt="1000 Viral Hooks preview"
      class="preview-image"
    />

    <!-- Form -->
    <div id="form-wrapper">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="inp-name" placeholder="Full Name" />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="inp-email" placeholder="Email" />
        <div class="error-msg" id="email-error">Please enter a valid email.</div>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">DOWNLOAD</button>
    </div>

    <!-- Shown briefly right before the redirect fires -->
    <div id="thank-you">
      <h2>You're in! 🎉</h2>
      <p>Your free hooks are on the way</p>
      <p class="redirect-note">Redirecting you now...</p>
    </div>

  </div><!-- /card -->

  <script>
    // ⬇️ Paste your Google Apps Script Web App URL here
    const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbxEPlHUy9wtenJiC7T_R9XG2OOZyGhvpVXDrmEJ-PN3T0103yN4z76QFVOOiAp9hTEr/exec';
    // Where people land after submitting
    const REDIRECT_URL = 'https://docs.google.com/document/d/1Ssu7Twfqx62tETWgwC42D6Ye_mNrMthdyQhHiT_DsfM/edit?usp=drivesdk';

    async function submitForm() {
      const name  = document.getElementById('inp-name').value.trim();
      const email = document.getElementById('inp-email').value.trim();
      const errEl = document.getElementById('email-error');
      const btn   = document.getElementById('submit-btn');

      errEl.style.display = 'none';
      if (!email || !email.includes('@')) {
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'SENDING...';
      btn.disabled = true;

      const body = new FormData();
      body.append('name', name);
      body.append('email', email);

      try {
        // no-cors = we can't read the response, but the request still goes through
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body });
      } catch (_) {
        // an opaque-response throw here is normal, data still saves
      }

      document.getElementById('form-wrapper').style.display = 'none';
      document.getElementById('thank-you').style.display = 'block';

      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, 1500);
    }
  </script>

</body>
</html>
